# セルフホスト用の最小構成。`.env` を読み、常駐（Socket Mode）させる。
#   docker compose up -d --build
services:
  bot:
    build: .
    env_file: .env
    # env_file の KB_DB_PATH を上書きし、確実に永続ボリューム上へ向ける（.env の値に依存しない）。
    environment:
      KB_DB_PATH: /app/data/kb.sqlite
      KB_INGEST_ON_BOOT: "true"
    # 回答キャッシュを再起動後も残すため /app/data を永続化（FTS は起動時に再構築される派生物）。
    volumes:
      - kbdata:/app/data
      # GitHub App 認証を使う場合は秘密鍵 PEM を read-only mount し、
      # .env に GITHUB_APP_PRIVATE_KEY_PATH=/app/github-app.pem を設定する。
      # - ./github-app.pem:/app/github-app.pem:ro
    restart: unless-stopped

volumes:
  kbdata:
