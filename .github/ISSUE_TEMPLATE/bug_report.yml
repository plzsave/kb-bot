name: Bug report
description: Report a problem with the bot
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Slack
        - Discord
        - Both
        - N/A (ingest / search / build)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste console output. Redact tokens and secrets.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "bun 1.3.x / Docker / OS, deploy target"
