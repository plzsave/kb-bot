version: 2
updates:
  # bun エコシステム（package.json / bun.lock の依存）。
  # npm だと package.json しか書き換えられず bun.lock が凍結のまま
  # ＝CI/Docker の `bun install --frozen-lockfile` が必ず落ちるため bun を使う。
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions のバージョン
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Dockerfile のベースイメージ
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
